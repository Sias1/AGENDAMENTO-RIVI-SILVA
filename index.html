<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Rivi Silva Esmalteria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        'gold-light': '#F5E6A3',
                        black: '#0A0A0A',
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #FFFFFF;
            color: #0A0A0A;
            font-family: 'Montserrat', sans-serif;
            background-image: radial-gradient(at 10% 10%, rgba(212, 175, 55, 0.03) 0px, transparent 50%);
        }
        .clean-card {
            background-color: #FDFDFD;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }
        .gold-gradient-bg {
            background: linear-gradient(135deg, #D4AF37 0%, #F5E6A3 100%);
            color: #FFFFFF;
        }
        .form-input {
            background-color: #FFFFFF !important;
            border: 1px solid rgba(212, 175, 55, 0.2) !important;
        }
        .form-input:focus {
            border-color: #D4AF37 !important;
            box-shadow: 0 0 0 1px #D4AF37 !important;
            outline: none;
        }
        /* Estilo para a lista de serviços */
        .service-item {
            transition: all 0.2s;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .service-item:hover {
            border-color: #D4AF37;
            background-color: rgba(212, 175, 55, 0.05);
        }
        input[type="checkbox"]:checked + label {
            color: #D4AF37;
            font-weight: 600;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">
    
    <header class="w-full max-w-7xl flex flex-col items-center mb-10 mt-4">
        <div class="h-24 md:h-32 w-24 md:w-32 rounded-full overflow-hidden border-2 border-gold mb-3 shadow-lg bg-zinc-100">
            <img src="image_5.png" alt="Rivi Silva" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150?text=Rivi+Silva'">
        </div>
        <p class="font-sans text-xs uppercase tracking-[0.5em] text-zinc-500 text-center">
            ESMALTERIA PREMIVM
        </p>
    </header>

    <main class="w-full max-w-7xl grid grid-cols-1 md:grid-cols-2 gap-12 items-start">
        
        <div class="flex flex-col gap-6 md:pr-10">
            <h2 class="text-4xl font-light text-zinc-900 leading-tight">
                Seu momento de brilhar começa aqui, <span class="font-semibold text-gold">gata. 💅</span>
            </h2>
            <p class="text-zinc-600 text-lg">
                Selecione os serviços desejados. O valor total é calculado automaticamente para você.
            </p>
            <div class="clean-card p-6 rounded-2xl border-l-4 border-l-gold">
                <p class="text-sm text-zinc-500">Valor Total Estimado:</p>
                <p id="totalDisplay" class="text-3xl font-bold text-black text-gold">R$ 0,00</p>
            </div>
        </div>

        <div class="w-full clean-card p-8 md:p-10 rounded-3xl">
            <h3 class="text-2xl font-semibold mb-8 border-b border-zinc-200 pb-4 text-gold">
                Solicitar Agendamento
            </h3>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-zinc-700 mb-2">Seu Nome Completo</label>
                    <input id="nome" type="text" placeholder="Ex: Maria Eduarda..." class="form-input w-full p-4 rounded-xl text-lg">
                </div>

                <div>
                    <label class="block text-sm font-medium text-zinc-700 mb-2">WhatsApp</label>
                    <input id="whatsapp" type="tel" placeholder="(00) 00000-0000" class="form-input w-full p-4 rounded-xl text-lg">
                </div>

                <div>
                    <label class="block text-sm font-medium text-zinc-700 mb-4">Escolha seus Serviços</label>
                    <div id="listaServicos" class="grid grid-cols-1 gap-3 max-h-60 overflow-y-auto pr-2">
                        <p class="text-zinc-400 italic">Carregando serviços...</p>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-zinc-700 mb-2">Data e Hora</label>
                    <input id="data" type="datetime-local" class="form-input w-full p-4 rounded-xl text-lg cursor-pointer">
                </div>

                <button id="btnAgendar" onclick="agendar()" class="w-full gold-gradient-bg font-bold py-5 rounded-xl text-lg uppercase tracking-widest hover:brightness-110 transition duration-300 transform hover:scale-[1.01] active:scale-[0.99] shadow-md shadow-gold/20">
                    CONFIRMAR AGENDAMENTO ✨
                </button>
            </div>
        </div>
    </main>

    <footer class="w-full max-w-7xl mt-20 pt-8 border-t border-zinc-200 text-center text-zinc-500 text-sm">
        <p>&copy; 2026 Rivi Silva Esmalteria. Todos os direitos reservados.</p>
    </footer>

    <script>
        const supabaseUrl = 'https://rahubkowehwtvditbhlx.supabase.co';
        const supabaseKey = 'sb_publishable_wKbs4gYVURdIR6Cafm8qFA_tUZZTIKo'; 
        
        // Configuração com headers para evitar bloqueios de CORS
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey, {
            global: { headers: { 'x-application-name': 'rivi-esmalteria' } }
        });

        let servicosSelecionados = [];

        // Trava o calendário para não aceitar datas passadas
        const agora = new Date();
        agora.setMinutes(agora.getMinutes() - agora.getTimezoneOffset());
        document.getElementById('data').min = agora.toISOString().slice(0, 16);

        async function carregarServicos() {
            const container = document.getElementById('listaServicos');
            try {
                const { data, error } = await _supabase.from('servicos').select('*').order('nome');
                if (error) throw error;
                
                if (data) {
                    container.innerHTML = '';
                    data.forEach(s => {
                        container.innerHTML += `
                            <div class="service-item flex items-center p-3 rounded-lg cursor-pointer">
                                <input type="checkbox" id="ser_${s.id}" value="${s.id}" data-preco="${s.preco}" 
                                    onchange="atualizarTotal()" class="w-5 h-5 accent-gold cursor-pointer">
                                <label for="ser_${s.id}" class="ml-3 flex-1 cursor-pointer text-zinc-800">
                                    ${s.nome} <span class="text-zinc-400 text-sm ml-2">R$ ${s.preco}</span>
                                </label>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                container.innerHTML = '<p class="text-red-500">Erro ao carregar serviços.</p>';
            }
        }

        function atualizarTotal() {
            const checkboxes = document.querySelectorAll('#listaServicos input[type="checkbox"]:checked');
            let total = 0;
            servicosSelecionados = [];
            
            checkboxes.forEach(cb => {
                total += parseFloat(cb.getAttribute('data-preco'));
                servicosSelecionados.push(cb.value);
            });

            document.getElementById('totalDisplay').innerText = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        async function agendar() {
            const nome = document.getElementById('nome').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const dataHora = document.getElementById('data').value;
            const btn = document.getElementById('btnAgendar');

            if(!nome || !whatsapp || servicosSelecionados.length === 0 || !dataHora) {
                return alert("Preencha tudo gata! Escolha ao menos um serviço. 💅💖");
            }

            const [dataAgendada, horarioAgendado] = dataHora.split('T');
            const mesAno = dataAgendada.substring(0, 7); 

            btn.innerHTML = "PROCESSANDO... ⏳";
            btn.disabled = true;

            try {
                // 1. Verifica Mês
                const { data: mesData } = await _supabase.from('meses_liberados').select('liberado').eq('mes_ano', mesAno).maybeSingle();
                if (!mesData || !mesData.liberado) throw new Error("Agenda deste mês fechada! 🔒");

                // 2. Verifica Bloqueio
                const { data: diaData } = await _supabase.from('agenda_bloqueada').select('*').eq('data_interditada', dataAgendada).maybeSingle();
                if (diaData) throw new Error("Rivi não atende neste dia. 🌸");

                // 3. Salva (Se o banco aceitar Array no servico_id, enviamos todos, senão enviamos o primeiro)
                const { error: insertError } = await _supabase.from('agendamentos').insert([{ 
                    cliente_nome: nome, 
                    cliente_whatsapp: whatsapp, 
                    servico_id: servicosSelecionados[0], // Pega o principal
                    data_agendada: dataAgendada,
                    horario_agendado: horarioAgendado 
                }]);

                if (insertError) throw insertError;

                alert('Agendamento feito! Você vai arrasar! ✨💖');
                location.reload();

            } catch (error) {
                alert(error.message);
                btn.innerHTML = "CONFIRMAR AGENDAMENTO ✨";
                btn.disabled = false;
            }
        }

        carregarServicos();
    </script>
</body>
</html>
