<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Rivi Silva Esmalteria</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        black: '#1A1A1A',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #F9F9F9; /* Fundo Clean */
            color: #1A1A1A; 
            font-family: sans-serif;
        }
        .form-input { 
            background-color: #FFFFFF; 
            border: 1px solid #DDD; 
            color: #1A1A1A; 
        }
        .form-input:focus { 
            border-color: #D4AF37; 
            outline: none; 
            box-shadow: 0 0 0 1px #D4AF37;
        }
        /* Estilo para a logo redonda */
        .logo-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #D4AF37;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">
    
    <header class="mb-8 text-center flex flex-col items-center">
        <img src="image_58ff49.png" alt="Logo Rivi Silva" class="logo-circle mb-4">
        <h1 class="text-4xl font-bold text-black mb-1">Rivi Silva</h1>
        <p class="text-xs uppercase tracking-[0.3em] text-gold font-semibold">Nails & Care</p>
    </header>

    <main class="w-full max-w-md bg-white p-8 rounded-2xl border border-zinc-200 shadow-2xl">
        <h2 class="text-2xl font-semibold mb-6 text-black text-center">Agendamento Online</h2>

        <div class="space-y-4">
            <div>
                <label class="block mb-1 text-sm text-zinc-500 font-medium">Nome da Cliente</label>
                <input id="nome" type="text" placeholder="Seu nome completo" class="form-input w-full p-3 rounded-lg">
            </div>
            
            <div>
                <label class="block mb-1 text-sm text-zinc-500 font-medium">Telefone</label>
                <input id="telefone" type="tel" placeholder="(00) 90000-0000" class="form-input w-full p-3 rounded-lg">
            </div>

            <div>
                <label class="block mb-1 text-sm text-zinc-500 font-medium">Serviço</label>
                <select id="servico" class="form-input w-full p-3 rounded-lg cursor-pointer">
                    <option value="" disabled selected>Selecione um serviço...</option>
                    <option>Alongamento em Gel</option>
                    <option>Banho de Gel</option>
                    <option>Manicure Simples</option>
                    <option>Pedicure</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 text-sm text-zinc-500 font-medium">Data</label>
                    <input id="data" type="date" class="form-input w-full p-3 rounded-lg cursor-pointer">
                </div>
                <div>
                    <label class="block mb-1 text-sm text-zinc-500 font-medium">Horário</label>
                    <input id="horario" type="time" class="form-input w-full p-3 rounded-lg cursor-pointer">
                </div>
            </div>

            <button onclick="finalizarAgendamento()" class="w-full bg-gold text-white font-bold py-4 mt-6 rounded-lg hover:brightness-110 transition duration-300 shadow-lg">
                CONFIRMAR AGENDAMENTO ✨
            </button>
        </div>
    </main>

    <footer class="mt-10 text-zinc-400 text-xs text-center">
        © 2026 Rivi Silva Esmalteria - Luxury Service
    </footer>

    <script>
        // CONEXÃO DIRETA COM O SEU BANCO
        const supabaseUrl = 'https://rahubkowehwtvditbhlx.supabase.co';
        // COLOQUE SUA CHAVE ANON ABAIXO
        const supabaseKey = 'SUA_CHAVE_ANON_AQUI'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function finalizarAgendamento() {
            const nomeValue = document.getElementById('nome').value;
            const telefoneValue = document.getElementById('telefone').value;
            const servicoValue = document.getElementById('servico').value;
            const dataValue = document.getElementById('data').value;
            const horarioValue = document.getElementById('horario').value;

            if(!nomeValue || !servicoValue || !dataValue || !horarioValue) {
                return alert("Preencha todos os campos, gata! 💅");
            }

            const { error } = await _supabase
                .from('agendamentos')
                .insert([{ 
                    cliente_nome: nomeValue, 
                    telefone: telefoneValue, 
                    servico: servicoValue, 
                    data: dataValue, 
                    horario: horarioValue,
                    status: 'Pendente'
                }]);

            if (error) {
                console.error(error);
                alert('Erro ao agendar. Verifique a tabela no banco!');
            } else {
                alert('Agendamento feito com sucesso! ✨ Te esperamos lá.');
                location.reload();
            }
        }
    </script>
</body>
</html>
