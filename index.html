<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Rivi Silva Esmalteria</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #FFF; color: #1a1a1a; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-box { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid #f0f0f0; position: relative; }
        .day-free { background: #f0fdf4; color: #166534; border-color: #bbf7d0; } 
        .day-busy { background: #fef2f2; color: #991b1b; border-color: #fecaca; cursor: not-allowed; }
        .day-selected { background: #D4AF37 !important; color: white !important; border-color: #B8860B !important; transform: scale(1.05); z-index: 10; box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3); }
        .time-slot { padding: 12px; border: 1px solid #e5e7eb; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.2s; background: white; }
        .time-slot:hover:not(.occupied) { border-color: #D4AF37; color: #D4AF37; background: #fffdf5; }
        .time-selected { background: #D4AF37 !important; color: white !important; border-color: #D4AF37 !important; }
        .occupied { background: #f3f4f6; color: #9ca3af; cursor: not-allowed; text-decoration: line-through; border-color: #e5e7eb; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background: linear-gradient(135deg, #D4AF37 0%, #F5E6A3 100%); }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <header class="text-center mb-10">
        <div class="w-24 h-24 rounded-full border-2 border-[#D4AF37] mx-auto mb-4 overflow-hidden bg-zinc-100">
            <img src="image_5.png" alt="Logo" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'">
        </div>
        <h1 class="text-2xl font-light tracking-[0.3em] uppercase">Rivi Silva <span class="font-bold gold-text">Esmalteria</span></h1>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <div class="bg-white p-6 rounded-3xl shadow-xl border border-zinc-100">
            <div class="flex justify-between items-center mb-6">
                <h3 id="monthName" class="font-bold text-lg text-zinc-800 capitalize">Março 2026</h3>
            </div>
            
            <div class="calendar-grid text-center text-xs font-bold text-zinc-400 mb-4 uppercase tracking-tighter">
                <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
            </div>
            <div id="calendarDays" class="calendar-grid"></div>
            
            <div class="mt-6 flex justify-center gap-6 text-xs font-medium">
                <div class="flex items-center gap-2"><span class="w-4 h-4 day-free rounded-md"></span> Disponível</div>
                <div class="flex items-center gap-2"><span class="w-4 h-4 day-busy rounded-md"></span> Indisponível</div>
            </div>
        </div>

        <div class="bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-zinc-100 flex flex-col">
            <div id="no-date-selected" class="flex-1 flex flex-col items-center justify-center text-zinc-400 space-y-4 py-20">
                <span class="text-5xl">🗓️</span>
                <p>Selecione um dia disponível no calendário</p>
            </div>

            <div id="booking-area" class="hidden space-y-6">
                <div class="border-b pb-4">
                    <h4 class="text-zinc-500 text-sm uppercase font-bold tracking-widest">Horários para</h4>
                    <p id="display-date" class="text-2xl font-bold gold-text">--/--/----</p>
                </div>

                <div id="time-slots" class="grid grid-cols-3 gap-3"></div>

                <div class="space-y-4 pt-4">
                    <input id="nome" type="text" placeholder="Seu Nome Completo" class="w-full p-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:outline-none focus:border-[#D4AF37]">
                    <input id="whatsapp" type="tel" placeholder="Seu WhatsApp" class="w-full p-4 bg-zinc-50 border border-zinc-200 rounded-2xl focus:outline-none focus:border-[#D4AF37]">
                    
                    <div id="servicos-container" class="space-y-2 max-h-40 overflow-y-auto p-2 border rounded-xl">
                        </div>

                    <div class="p-4 bg-zinc-900 rounded-2xl flex justify-between items-center">
                        <span class="text-zinc-400 text-sm">Total Estimado:</span>
                        <span id="total-price" class="text-white font-bold text-xl">R$ 0,00</span>
                    </div>

                    <button id="btn-finalizar" onclick="salvarAgendamento()" class="w-full gold-bg text-white font-bold py-5 rounded-2xl shadow-lg hover:scale-[1.02] transition active:scale-95 uppercase tracking-widest">
                        Confirmar para às <span id="confirm-time">--:--</span> ✨
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://rahubkowehwtvditbhlx.supabase.co';
        const supabaseKey = 'sb_publishable_wKbs4gYVURdIR6Cafm8qFA_tUZZTIKo'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let diaSelecionado = null;
        let horaSelecionada = null;
        let precoTotal = 0;
        const horariosTrabalho = ["08:00", "09:00", "10:00", "11:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00"];

        // 1. CARREGA CALENDÁRIO
        async function init() {
            const container = document.getElementById('calendarDays');
            const dataAtual = new Date();
            const ano = dataAtual.getFullYear();
            const mes = dataAtual.getMonth();

            // Busca dias bloqueados e meses liberados
            const { data: bloqueios } = await _supabase.from('agenda_bloqueada').select('data_interditada');
            const { data: meses } = await _supabase.from('meses_liberados').select('mes_ano, liberado');

            const diasBloqueados = bloqueios?.map(b => b.data_interditada) || [];
            const mesLiberado = meses?.find(m => m.mes_ano === `${ano}-${String(mes+1).padStart(2, '0')}`)?.liberado;

            const primeiroDia = new Date(ano, mes, 1).getDay();
            const diasNoMes = new Date(ano, mes + 1, 0).getDate();

            container.innerHTML = '';
            for(let i=0; i<primeiroDia; i++) container.innerHTML += '<div></div>';

            for(let dia=1; dia<=diasNoMes; dia++) {
                const dataFormatada = `${ano}-${String(mes+1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                const isPassado = new Date(dataFormatada) < new Date().setHours(0,0,0,0);
                const isBlocked = diasBloqueados.includes(dataFormatada) || !mesLiberado;
                
                const diaDiv = document.createElement('div');
                diaDiv.className = `day-box ${ (isBlocked || isPassado) ? 'day-busy' : 'day-free' }`;
                diaDiv.innerHTML = `<span class="text-xs font-bold">${dia}</span>`;
                
                if(!isBlocked && !isPassado) {
                    diaDiv.onclick = () => selecionarDia(diaDiv, dataFormatada);
                }
                container.appendChild(diaDiv);
            }
            carregarServicos();
        }

        // 2. SELECIONA DIA E BUSCA HORÁRIOS OCUPADOS
        async function selecionarDia(el, data) {
            document.querySelectorAll('.day-box').forEach(d => d.classList.remove('day-selected'));
            el.classList.add('day-selected');
            
            diaSelecionado = data;
            document.getElementById('no-date-selected').classList.add('hidden');
            document.getElementById('booking-area').classList.remove('hidden');
            document.getElementById('display-date').innerText = data.split('-').reverse().join('/');
            
            // Busca o que já tá agendado nesse dia no Supabase
            const { data: agendados } = await _supabase.from('agendamentos').select('horario_agendado').eq('data_agendada', data);
            const ocupados = agendados?.map(a => a.horario_agendado.substring(0, 5)) || [];

            const slotsContainer = document.getElementById('time-slots');
            slotsContainer.innerHTML = '';

            horariosTrabalho.forEach(hora => {
                const isOcupado = ocupados.includes(hora);
                const btn = document.createElement('div');
                btn.className = `time-slot ${isOcupado ? 'occupied' : ''}`;
                btn.innerText = hora;
                if(!isOcupado) {
                    btn.onclick = () => {
                        document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('time-selected'));
                        btn.classList.add('time-selected');
                        horaSelecionada = hora;
                        document.getElementById('confirm-time').innerText = hora;
                    };
                }
                slotsContainer.appendChild(btn);
            });
        }

        // 3. CARREGA SERVIÇOS DO BANCO
        async function carregarServicos() {
            const container = document.getElementById('servicos-container');
            const { data } = await _supabase.from('servicos').select('*').order('nome');
            if(data) {
                container.innerHTML = data.map(s => `
                    <label class="flex justify-between items-center p-2 hover:bg-zinc-50 rounded-lg cursor-pointer">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" value="${s.id}" data-price="${s.preco}" onchange="calcularTotal()" class="w-5 h-5 accent-[#D4AF37]">
                            <span class="text-sm">${s.nome}</span>
                        </div>
                        <span class="text-xs font-bold text-zinc-400">R$ ${s.preco}</span>
                    </label>
                `).join('');
            }
        }

        function calcularTotal() {
            precoTotal = 0;
            const checks = document.querySelectorAll('input[type="checkbox"]:checked');
            checks.forEach(c => precoTotal += parseFloat(c.dataset.price));
            document.getElementById('total-price').innerText = `R$ ${precoTotal.toFixed(2).replace('.', ',')}`;
        }

        // 4. SALVA TUDO
        async function salvarAgendamento() {
            const nome = document.getElementById('nome').value;
            const zap = document.getElementById('whatsapp').value;
            const servicos = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(c => c.value);

            if(!nome || !zap || !horaSelecionada || servicos.length === 0) {
                return alert("Preenche tudo, gata! Nome, zap, serviço e o horário. 💅");
            }

            document.getElementById('btn-finalizar').innerText = "PROCESSANDO... ✨";

            const { error } = await _supabase.from('agendamentos').insert([{
                cliente_nome: nome,
                cliente_whatsapp: zap,
                data_agendada: diaSelecionado,
                horario_agendado: horaSelecionada,
                servico_id: servicos[0] // Salvando o principal
            }]);

            if(error) {
                alert("Erro: " + error.message);
                document.getElementById('btn-finalizar').innerText = "Confirmar Agendamento";
            } else {
                alert("AGENDADO! Prepara o look que a Rivi te espera! 💖✨");
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
