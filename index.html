<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Rivi Silva Esmalteria</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFFFFF; font-family: 'Montserrat', sans-serif; background-image: radial-gradient(at 10% 10%, rgba(212, 175, 55, 0.05) 0px, transparent 50%); }
        .gold-text { color: #D4AF37; }
        .gold-bg { background: linear-gradient(135deg, #D4AF37 0%, #F5E6A3 100%); }
        .clean-card { background-color: #FDFDFD; border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05); }
        
        .form-input-container { position: relative; }
        .form-input { border: 1px solid rgba(212, 175, 55, 0.2) !important; transition: 0.3s; padding-left: 2.75rem !important; }
        .form-input:focus { border-color: #D4AF37 !important; box-shadow: 0 0 0 1px #D4AF37 !important; outline: none; }
        .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #D4AF37; width: 1.1rem; height: 1.1rem; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-box { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid #eee; font-size: 0.85rem; font-weight: 600; }
        .day-free { background: #f0fdf4; color: #166534; border-color: #bbf7d0; } 
        .day-busy { background: #fef2f2 !important; color: #991b1b !important; border-color: #fecaca !important; cursor: not-allowed; opacity: 0.5; }
        .day-selected { background: #D4AF37 !important; color: white !important; border-color: #D4AF37 !important; }
        .day-special { border: 2px solid #D4AF37 !important; position: relative; }
        .day-special::after { content: ''; position: absolute; top: 2px; right: 2px; width: 6px; height: 6px; background: #D4AF37; border-radius: 50%; }

        .time-slot { padding: 10px; border: 1px solid #eee; border-radius: 10px; text-align: center; cursor: pointer; font-size: 0.85rem; background: white; transition: 0.2s; }
        .time-selected { background: #D4AF37; color: white; border-color: #D4AF37; }
        .occupied { background: #f3f4f6; color: #9ca3af; cursor: not-allowed; text-decoration: line-through; }
        
        .perfil-img { mask-image: linear-gradient(to right, black 70%, transparent 100%); -webkit-mask-image: linear-gradient(to right, black 70%, transparent 100%); object-fit: cover; object-position: top; }
        @media (max-width: 1024px) { .perfil-img { mask-image: linear-gradient(to bottom, black 70%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%); height: 350px; width: 100%; } }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div class="mb-8 flex flex-col items-center gap-2 text-center">
        <img src="logo.png" alt="Rivi Silva Esmalteria" class="h-24 md:h-32 object-contain">
        <p class="text-[10px] gold-text font-bold uppercase tracking-[0.4em] mb-2">Design de Luxo</p>
        
        <div class="flex gap-8 items-center justify-center">
            <a href="https://www.instagram.com/esmalteria_rivi?igsh=MWx2dzNxenRmYzF0bQ==" target="_blank" class="hover:scale-125 transition-transform duration-300">
                <i data-lucide="instagram" class="text-[#D4AF37]"></i>
            </a>
            <a href="https://api.whatsapp.com/send?phone=5571992447638" class="hover:scale-125 transition-transform duration-300">
                <i data-lucide="smartphone" class="text-[#D4AF37]"></i>
            </a>
            <a href="#" target="_blank" class="hover:scale-125 transition-transform duration-300">
                <i data-lucide="map-pin" class="text-[#D4AF37]"></i>
            </a>
        </div>
    </div>

    <main class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
        
        <div class="flex flex-col lg:flex-row gap-6 items-center lg:items-start lg:pr-10">
            <img src="foto_perfil.jpg" alt="Rivi Silva" class="perfil-img w-full lg:w-1/2 rounded-3xl lg:rounded-none">
            <div class="flex flex-col gap-6 mt-4 lg:mt-20">
                <h2 class="text-4xl md:text-5xl font-light text-zinc-900 leading-tight text-center lg:text-left">
                    Seu momento de brilhar começa aqui! <span class="font-semibold gold-text"> 💅</span>
                </h2>
                <p class="text-zinc-600 text-lg italic border-l-2 border-[#D4AF37] pl-4">"Unhas feitas, auto-estima renovada."</p>
            </div>
        </div>

        <div class="w-full clean-card p-6 md:p-10 rounded-3xl space-y-6">
            <h3 class="text-xl font-semibold gold-text text-center uppercase tracking-widest mb-6">Solicitar Agendamento</h3>

            <div class="space-y-4">
                <div class="form-input-container">
                    <i data-lucide="user" class="input-icon"></i>
                    <input id="nome" type="text" placeholder="Seu Nome Completo" class="form-input w-full p-4 rounded-xl uppercase text-xs font-bold bg-zinc-50">
                </div>
                <div class="form-input-container">
                    <i data-lucide="smartphone" class="input-icon"></i>
                    <input id="whatsapp_input" type="tel" maxlength="15" oninput="this.value = phoneMask(this.value)" placeholder="(71) 00000-0000" class="form-input w-full p-4 rounded-xl text-xs font-bold bg-zinc-50">
                </div>
            </div>

            <div class="mt-6">
                <label class="block text-xs font-bold text-zinc-400 uppercase mb-2 flex items-center gap-2">
                    <i data-lucide="sparkles" class="w-3 h-3 gold-text"></i> Serviços
                </label>
                <div id="listaServicos" class="grid grid-cols-1 gap-1 max-h-40 overflow-y-auto border border-zinc-100 rounded-xl p-2 bg-white text-[10px]"></div>
                <div class="mt-4">
                    <div class="p-4 bg-zinc-900 rounded-xl flex justify-between items-center text-white shadow-xl">
                        <span class="text-zinc-400 font-bold text-xs uppercase">Total:</span>
                        <span id="totalDisplay" class="text-2xl font-bold gold-text">R$ 0,00</span>
                    </div>
                </div>
            </div>

            <div class="pt-4 border-t">
                <div class="flex items-center justify-between mb-4 px-2">
                    <button onclick="mudarMes(-1)" class="gold-text p-1 hover:bg-zinc-100 rounded-full transition-all"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
                    <label id="mesAnoAtual" class="block text-xs font-bold text-zinc-400 uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="calendar" class="w-4 h-4 gold-text"></i> CARREGANDO...
                    </label>
                    <button onclick="mudarMes(1)" class="gold-text p-1 hover:bg-zinc-100 rounded-full transition-all"><i data-lucide="chevron-right" class="w-6 h-6"></i></button>
                </div>
                <div id="calendarDays" class="calendar-grid"></div>
            </div>

            <div id="section-horarios" class="hidden space-y-4 pt-4 border-t border-zinc-100">
                <label class="block text-xs font-bold text-zinc-400 uppercase text-center tracking-widest flex items-center justify-center gap-2">
                    <i data-lucide="clock" class="w-4 h-4 gold-text"></i> Horários para <span id="display-date" class="gold-text">--/--</span>
                </label>
                <div id="time-slots" class="grid grid-cols-3 gap-2 pb-4"></div>

                <div class="p-5 bg-amber-50 border border-amber-200 rounded-2xl flex flex-col items-center gap-3">
                    <p class="text-[11px] text-amber-800 font-bold uppercase text-center leading-relaxed">
                        Para confirmar o agendamento envie um sinal de <span class="text-lg block font-black">R$ 50,00</span>
                    </p>
                    <div class="w-full space-y-1">
                        <span class="text-[9px] text-amber-600 font-bold uppercase block text-center">Chave PIX (Telefone) Ryan Caique Santana</span>
                        <div class="flex items-center gap-2 bg-white p-3 rounded-xl border border-amber-200">
                            <i data-lucide="qr-code" class="w-4 h-4 text-amber-600"></i>
                            <input id="pixKey" type="text" value="(71) 99244-7638" readonly class="bg-transparent text-center text-xs font-bold text-zinc-700 w-full outline-none">
                            <button onclick="copyPix()" class="gold-bg text-zinc-900 text-[10px] font-bold px-4 py-2 rounded-lg active:scale-95 transition-all">COPIAR</button>
                        </div>
                    </div>
                </div>

                <button id="btnAgendar" onclick="finalizarAgendamento()" class="w-full bg-[#25D366] text-white font-black py-5 rounded-xl shadow-lg uppercase text-[11px] tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all">
                    <i data-lucide="check-circle" class="w-5 h-5"></i> Envie o Comprovante Aqui 💅
                </button>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://rahubkowehwtvditbhlx.supabase.co';
        const supabaseKey = 'sb_publishable_wKbs4gYVURdIR6Cafm8qFA_tUZZTIKo'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let dataSelecionada = null, horaSelecionada = null;
        let configPadrao = { inicio: '09:00', fim: '18:00', intervalo: 40 };
        let bloqueios = [], excecoes = {};
        let mesVisualizado = new Date();

        function phoneMask(v) {
            v = v.replace(/\D/g, "");
            if (v.length > 11) v = v.substring(0, 11);
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
            v = v.replace(/(\d)(\d{4})$/, "$1-$2");
            return v;
        }

        function copyPix() {
            const pixVal = document.getElementById('pixKey').value;
            navigator.clipboard.writeText(pixVal).then(() => { alert("Chave PIX copiada! 💅"); });
        }

        async function init() {
            carregarServicos();
            await atualizarCalendario();
        }

        async function mudarMes(direcao) {
            mesVisualizado.setMonth(mesVisualizado.getMonth() + direcao);
            document.getElementById('section-horarios').classList.add('hidden');
            await atualizarCalendario();
        }

        async function atualizarCalendario() {
            const container = document.getElementById('calendarDays');
            const labelMes = document.getElementById('mesAnoAtual');
            const mesesNomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            labelMes.innerText = `${mesesNomes[mesVisualizado.getMonth()]} ${mesVisualizado.getFullYear()}`;
            const ano = mesVisualizado.getFullYear();
            const mes = String(mesVisualizado.getMonth() + 1).padStart(2, '0');
            const mesAnoKey = `${ano}-${mes}`;

            const [resConfig, resBloqueios, resExcecoes, resMeses] = await Promise.all([
                _supabase.from('agenda_config').select('*').eq('id', 1).maybeSingle(),
                _supabase.from('agenda_bloqueada').select('data_interditada'),
                _supabase.from('agenda_excecoes').select('*'),
                _supabase.from('meses_liberados').select('liberado').eq('mes_ano', mesAnoKey).maybeSingle()
            ]);

            if (resConfig.data) configPadrao = { inicio: resConfig.data.hora_inicio, fim: resConfig.data.hora_fim, intervalo: resConfig.data.intervalo_minutos };
            bloqueios = resBloqueios.data ? resBloqueios.data.map(b => b.data_interditada) : [];
            excecoes = {};
            if (resExcecoes.data) resExcecoes.data.forEach(ex => excecoes[ex.data] = { inicio: ex.hora_inicio, fim: ex.hora_fim });

            if (resMeses.data?.liberado !== true) {
                container.innerHTML = `<div class="col-span-7 flex flex-col items-center py-10 opacity-60"><i data-lucide="lock" class="w-8 h-8 mb-2 gold-text"></i><p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest text-center">Agenda fechada para este mês.</p></div>`;
            } else { 
                renderCalendar(mesVisualizado); 
            }
            if (window.lucide) { lucide.createIcons(); }
        }

        function renderCalendar(dataBase) {
            const container = document.getElementById('calendarDays');
            const primeiroDia = new Date(dataBase.getFullYear(), dataBase.getMonth(), 1).getDay();
            const ultimoDia = new Date(dataBase.getFullYear(), dataBase.getMonth() + 1, 0).getDate();
            const hoje = new Date(); hoje.setHours(0,0,0,0);
            container.innerHTML = '';
            for(let i=0; i<primeiroDia; i++) container.innerHTML += '<div></div>';
            for(let d=1; d<=ultimoDia; d++) {
                const dataStr = `${dataBase.getFullYear()}-${String(dataBase.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dataLoop = new Date(dataBase.getFullYear(), dataBase.getMonth(), d);
                const isBlocked = bloqueios.includes(dataStr);
                const isPassado = dataLoop < hoje;
                const box = document.createElement('div');
                box.className = `day-box ${isPassado || isBlocked ? 'day-busy' : 'day-free'} ${excecoes[dataStr] && !isBlocked ? 'day-special' : ''}`;
                box.innerText = d;
                if(!isPassado && !isBlocked) { box.onclick = () => carregarHorarios(box, dataStr); }
                container.appendChild(box);
            }
        }

        async function carregarHorarios(el, data) {
            document.querySelectorAll('.day-box').forEach(d => d.classList.remove('day-selected'));
            el.classList.add('day-selected');
            dataSelecionada = data; horaSelecionada = null;
            document.getElementById('section-horarios').classList.remove('hidden');
            document.getElementById('display-date').innerText = data.split('-').reverse().join('/');
            const { data: ocupados } = await _supabase.from('agendamentos').select('horario').eq('data_atendimento', data).not('status', 'eq', 'Cancelado');
            const ocupadosList = ocupados?.map(o => o.horario.substring(0, 5)) || [];
            const hI = excecoes[data]?.inicio || configPadrao.inicio, hF = excecoes[data]?.fim || configPadrao.fim;
            const slotsDiv = document.getElementById('time-slots'); slotsDiv.innerHTML = ''; 
            let [h, m] = hI.split(':').map(Number);
            let totalMin = (h * 60) + m;
            const totalFim = (parseInt(hF.split(':')[0]) * 60) + parseInt(hF.split(':')[1]);
            while (totalMin < totalFim) {
                const hFormat = `${String(Math.floor(totalMin / 60)).padStart(2, '0')}:${String(totalMin % 60).padStart(2, '0')}`;
                const btn = document.createElement('div');
                btn.className = `time-slot ${ocupadosList.includes(hFormat) ? 'occupied' : 'hover:gold-text'}`;
                btn.innerText = hFormat;
                if (!ocupadosList.includes(hFormat)) btn.onclick = () => {
                    document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('time-selected'));
                    btn.classList.add('time-selected'); horaSelecionada = hFormat;
                };
                slotsDiv.appendChild(btn);
                totalMin += parseInt(configPadrao.intervalo);
            }
        }

        async function carregarServicos() {
            const { data } = await _supabase.from('servicos').select('*').order('nome');
            if(data) document.getElementById('listaServicos').innerHTML = data.map(s => `<label class="flex justify-between items-center p-3 hover:bg-zinc-50 border-b last:border-0 border-zinc-100 cursor-pointer"><div class="flex items-center gap-3"><input type="checkbox" value="${s.nome}" data-price="${s.preco}" onchange="calcTotal()" class="accent-[#D4AF37] w-4 h-4"><span class="font-bold text-zinc-800 uppercase text-[10px] tracking-tighter">${s.nome}</span></div><span class="text-zinc-400 font-bold">R$ ${s.preco.toFixed(2).replace('.', ',')}</span></label>`).join('');
        }

        function calcTotal() {
            let t = 0; document.querySelectorAll('input[type="checkbox"]:checked').forEach(c => t += parseFloat(c.dataset.price));
            document.getElementById('totalDisplay').innerText = `R$ ${t.toFixed(2).replace('.', ',')}`;
        }

        async function finalizarAgendamento() {
            const n = document.getElementById('nome').value.trim(), z = document.getElementById('whatsapp_input').value; 
            const svs = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(c => c.value);
            if(!n || z.length < 14 || !dataSelecionada || !horaSelecionada || svs.length === 0) return alert("Preencha tudo! 💅");
            const totalStr = document.getElementById('totalDisplay').innerText;
            
            const { error } = await _supabase.from('agendamentos').insert([{
                cliente_nome: n.toUpperCase(), telefone: z, data_atendimento: dataSelecionada,
                horario: horaSelecionada, servico: svs.join(", "), status: "Aguardando",
                valor: parseFloat(totalStr.replace('R$ ', '').replace(',', '.'))
            }]);

            if(!error) {
                const msg = `Agendamento Rivi Silva 💅\n\nNome: ${n.toUpperCase()}\nData: ${dataSelecionada.split('-').reverse().join('/')}\nHora: ${horaSelecionada}\nServiços: ${svs.join(", ")}\nTotal: ${totalStr}\n\nsegue o meu comprovante com o sinal para garantir o meu agendamento!`;
                // Usando location.href para forçar redirecionamento na mesma aba (mais eficaz em celulares)
                window.location.href = `https://api.whatsapp.com/send?phone=5571992447638&text=${encodeURIComponent(msg)}`;
            } else { alert("Erro ao agendar."); }
        }
        init();
    </script>
</body>
</html>
