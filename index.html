<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Rivi Silva Esmalteria</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        black: '#1A1A1A',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #F9F9F9; 
            color: #1A1A1A; 
            font-family: sans-serif;
            /* Detalhe dourado sutil no fundo para não ficar "vazio" */
            background-image: 
                radial-gradient(at 0% 0%, rgba(212, 175, 55, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(212, 175, 55, 0.05) 0px, transparent 50%);
        }
        .form-input { 
            background-color: #FFFFFF; 
            border: 1px solid #DDD; 
            color: #1A1A1A; 
        }
        .form-input:focus { 
            border-color: #D4AF37; 
            outline: none; 
            box-shadow: 0 0 0 1px #D4AF37;
        }
        .logo-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #D4AF37;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: white;
        }
        .price-badge {
            background-color: #FFFDF2;
            border: 1px dashed #D4AF37;
            color: #D4AF37;
            font-weight: bold;
        }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">
    
    <header class="mb-8 text-center flex flex-col items-center">
        <img src="image_58ff49.png" alt="Logo Rivi Silva" class="logo-circle mb-4">
        <h1 class="text-4xl font-bold text-black mb-1">Rivi Silva</h1>
        <p class="text-xs uppercase tracking-[0.3em] text-gold font-semibold">Nails & Care</p>
    </header>

    <main class="w-full max-w-md bg-white p-8 rounded-2xl border border-zinc-200 shadow-2xl">
        <h2 class="text-2xl font-semibold mb-6 text-black text-center">Agendamento Online</h2>

        <div class="space-y-4">
            <div>
                <label class="block mb-1 text-sm text-zinc-500 font-medium">Nome da Cliente</label>
                <input id="nome" type="text" placeholder="Seu nome completo" class="form-input w-full p-3 rounded-lg">
            </div>
            
            <div>
                <label class="block mb-1 text-sm text-zinc-500 font-medium">Telefone / WhatsApp</label>
                <input id="telefone" type="tel" placeholder="(00) 90000-0000" class="form-input w-full p-3 rounded-lg">
            </div>

            <div>
                <label class="block mb-1 text-sm text-zinc-500 font-medium">Serviço</label>
                <select id="servico" onchange="atualizarPreco()" class="form-input w-full p-3 rounded-lg cursor-pointer">
                    <option value="" disabled selected>Selecione um serviço...</option>
                    <option value="Alongamento em Gel" data-preco="120,00">Alongamento em Gel</option>
                    <option value="Banho de Gel" data-preco="80,00">Banho de Gel</option>
                    <option value="Manicure Simples" data-preco="40,00">Manicure Simples</option>
                    <option value="Pedicure" data-preco="45,00">Pedicure</option>
                    <option value="Combo Pé e Mão" data-preco="80,00">Combo Pé e Mão</option>
                </select>
            </div>

            <div id="area-preco" class="hidden animate-pulse">
                <div class="price-badge p-3 rounded-lg text-center text-lg">
                    Valor: R$ <span id="valor-servico">0,00</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 text-sm text-zinc-500 font-medium">Data</label>
                    <input id="data" type="date" class="form-input w-full p-3 rounded-lg cursor-pointer">
                </div>
                <div>
                    <label class="block mb-1 text-sm text-zinc-500 font-medium">Horário</label>
                    <input id="horario" type="time" class="form-input w-full p-3 rounded-lg cursor-pointer">
                </div>
            </div>

            <button onclick="finalizarAgendamento()" class="w-full bg-gold text-white font-bold py-4 mt-6 rounded-lg hover:brightness-110 transition duration-300 shadow-lg">
                CONFIRMAR AGENDAMENTO ✨
            </button>
        </div>
    </main>

    <footer class="mt-10 text-zinc-400 text-xs text-center pb-6">
        © 2026 Rivi Silva Esmalteria - Luxury Service
    </footer>

    <script>
        // Função para mostrar o preço na hora
        function atualizarPreco() {
            const select = document.getElementById('servico');
            const areaPreco = document.getElementById('area-preco');
            const valorSpan = document.getElementById('valor-servico');
            
            const preco = select.options[select.selectedIndex].getAttribute('data-preco');

            if (preco) {
                valorSpan.innerText = preco;
                areaPreco.classList.remove('hidden');
            }
        }

        // CONEXÃO COM O SUPABASE
        const supabaseUrl = 'https://rahubkowehwtvditbhlx.supabase.co';
        const supabaseKey = 'SUA_CHAVE_ANON_AQUI'; // <--- COLOQUE SUA CHAVE AQUI
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function finalizarAgendamento() {
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const servico = document.getElementById('servico').value;
            const data = document.getElementById('data').value;
            const horario = document.getElementById('horario').value;
            const valor = document.getElementById('valor-servico').innerText;

            if(!nome || !telefone || !servico || !data || !horario) {
                return alert("Preencha todos os campos, gata! 💅");
            }

            const { error } = await _supabase
                .from('agendamentos')
                .insert([{ 
                    cliente_nome: nome, 
                    telefone: telefone, 
                    servico: servico, 
                    valor: valor,
                    data: data, 
                    horario: horario,
                    status: 'Pendente'
                }]);

            if (error) {
                console.error(error);
                alert('Erro ao agendar. Verifique a tabela no banco!');
            } else {
                alert('Agendamento feito com sucesso! ✨ Te esperamos lá.');
                location.reload();
            }
        }
    </script>
</body>
</html>
