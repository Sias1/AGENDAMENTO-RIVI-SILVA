<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Rivi Silva Esmalteria</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFFFFF; font-family: 'Montserrat', sans-serif; background-image: radial-gradient(at 10% 10%, rgba(212, 175, 55, 0.05) 0px, transparent 50%); }
        .gold-text { color: #D4AF37; }
        .gold-bg { background: linear-gradient(135deg, #D4AF37 0%, #F5E6A3 100%); }
        .clean-card { background-color: #FDFDFD; border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05); }
        .form-input { border: 1px solid rgba(212, 175, 55, 0.2) !important; transition: 0.3s; }
        .form-input:focus { border-color: #D4AF37 !important; box-shadow: 0 0 0 1px #D4AF37 !important; outline: none; }

        /* CALENDÁRIO DINÂMICO */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-box { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid #eee; font-size: 0.85rem; font-weight: 600; }
        .day-free { background: #f0fdf4; color: #166534; border-color: #bbf7d0; } 
        .day-busy { background: #fef2f2; color: #991b1b; border-color: #fecaca; cursor: not-allowed; opacity: 0.5; }
        .day-selected { background: #D4AF37 !important; color: white !important; border-color: #B8860B !important; transform: scale(1.05); }
        
        /* HORÁRIOS DINÂMICOS */
        .time-slot { padding: 10px; border: 1px solid #eee; border-radius: 10px; text-align: center; cursor: pointer; font-size: 0.85rem; background: white; }
        .time-selected { background: #D4AF37; color: white; border-color: #D4AF37; }
        .occupied { background: #f3f4f6; color: #9ca3af; cursor: not-allowed; text-decoration: line-through; border: 1px dashed #d1d5db; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <header class="w-full max-w-7xl flex flex-col items-center mb-10 mt-4">
        <div class="h-24 md:h-32 w-24 md:w-32 rounded-full overflow-hidden border-2 border-[#D4AF37] mb-3 shadow-lg bg-zinc-100">
            <img src="image_5.png" alt="Rivi Silva" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'">
        </div>
        <p class="font-sans text-xs uppercase tracking-[0.5em] text-zinc-500 text-center">ESMALTERIA PREMIVM</p>
    </header>

    <main class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-2 gap-12">
        
        <div class="flex flex-col gap-6 lg:pr-10">
            <h2 class="text-4xl md:text-5xl font-light text-zinc-900 leading-tight">
                Seu momento de brilhar começa aqui, <span class="font-semibold gold-text">gata. 💅</span>
            </h2>
            <p class="text-zinc-600 text-lg italic border-l-2 border-gold pl-4">"Unhas feitas, auto-estima renovada."</p>
        </div>

        <div class="w-full clean-card p-6 md:p-10 rounded-3xl space-y-6">
            <h3 class="text-xl font-semibold text-gold text-center uppercase tracking-widest mb-6">Solicitar Agendamento</h3>

            <div class="space-y-4">
                <input id="nome" type="text" placeholder="Seu Nome Completo" class="form-input w-full p-4 rounded-xl">
                <input id="whatsapp" type="tel" placeholder="WhatsApp" class="form-input w-full p-4 rounded-xl">
            </div>

            <div>
                <label class="block text-xs font-bold text-zinc-400 uppercase mb-2">Serviços</label>
                <div id="listaServicos" class="grid grid-cols-1 gap-1 max-h-40 overflow-y-auto border rounded-xl p-2 bg-white"></div>
                <div class="mt-3 p-4 bg-zinc-900 rounded-xl flex justify-between items-center text-white">
                    <span class="text-zinc-400">Total:</span>
                    <span id="totalDisplay" class="text-2xl font-bold gold-text">R$ 0,00</span>
                </div>
            </div>

            <div class="pt-4 border-t">
                <label class="block text-xs font-bold text-zinc-400 uppercase mb-3 text-center">Escolha o Dia</label>
                <div id="calendarDays" class="calendar-grid"></div>
            </div>

            <div id="section-horarios" class="hidden space-y-4 pt-4 border-t">
                <label class="block text-xs font-bold text-zinc-400 uppercase text-center">Horários para <span id="display-date" class="gold-text">--/--</span></label>
                <div id="time-slots" class="grid grid-cols-3 gap-2"></div>
                
                <button id="btnAgendar" onclick="finalizarAgendamento()" class="w-full gold-bg text-white font-bold py-5 rounded-xl shadow-lg uppercase tracking-widest mt-4">
                    CONFIRMAR AGENDAMENTO ✨
                </button>
            </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://rahubkowehwtvditbhlx.supabase.co';
        const supabaseKey = 'sb_publishable_wKbs4gYVURdIR6Cafm8qFA_tUZZTIKo'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let dataSelecionada = null;
        let horaSelecionada = null;
        const horariosPadrao = ["08:00", "09:00", "10:00", "11:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00"];

        async function init() {
            const container = document.getElementById('calendarDays');
            const hoje = new Date();
            
            const { data: bloqueios } = await _supabase.from('agenda_bloqueada').select('data_interditada');
            const listaBloqueados = bloqueios?.map(b => b.data_interditada) || [];

            const primeiroDia = new Date(hoje.getFullYear(), hoje.getMonth(), 1).getDay();
            const totalDias = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0).getDate();

            container.innerHTML = '';
            for(let i=0; i<primeiroDia; i++) container.innerHTML += '<div></div>';

            for(let d=1; d<=totalDias; d++) {
                const dataStr = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isPast = new Date(dataStr) < new Date().setHours(0,0,0,0);
                const isBlocked = listaBloqueados.includes(dataStr);
                
                const box = document.createElement('div');
                box.className = `day-box ${ (isPast || isBlocked) ? 'day-busy' : 'day-free' }`;
                box.innerText = d;
                if(!isPast && !isBlocked) box.onclick = () => carregarHorarios(box, dataStr);
                container.appendChild(box);
            }
            carregarServicos();
        }

        async function carregarHorarios(el, data) {
            document.querySelectorAll('.day-box').forEach(d => d.classList.remove('day-selected'));
            el.classList.add('day-selected');
            dataSelecionada = data;
            horaSelecionada = null; // Reseta a seleção de hora ao mudar o dia
            
            document.getElementById('section-horarios').classList.remove('hidden');
            document.getElementById('display-date').innerText = data.split('-').reverse().join('/');

            // CONSULTA COM FILTRO DE DATA
            const { data: ocupados, error } = await _supabase
                .from('agendamentos')
                .select('horario_agendado')
                .eq('data_agendada', data);
            
            if(error) console.error("Erro ao buscar horários:", error);

            // Garante que o formato do horário seja apenas HH:mm para comparação
            const listaOcupados = ocupados?.map(o => o.horario_agendado.trim().substring(0, 5)) || [];

            const slots = document.getElementById('time-slots');
            slots.innerHTML = '';
            
            horariosPadrao.forEach(h => {
                const isOcupado = listaOcupados.includes(h);
                const btn = document.createElement('div');
                btn.className = `time-slot ${isOcupado ? 'occupied' : 'hover:border-gold'}`;
                btn.innerText = h;
                
                if(!isOcupado) {
                    btn.onclick = () => {
                        document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('time-selected'));
                        btn.classList.add('time-selected');
                        horaSelecionada = h;
                    };
                }
                slots.appendChild(btn);
            });
        }

        async function carregarServicos() {
            const { data } = await _supabase.from('servicos').select('*').order('nome');
            if(data) {
                document.getElementById('listaServicos').innerHTML = data.map(s => `
                    <label class="flex justify-between items-center p-3 hover:bg-zinc-50 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" value="${s.id}" data-price="${s.preco}" onchange="calcTotal()" class="accent-gold w-4 h-4">
                            <span class="text-sm font-medium text-zinc-700">${s.nome}</span>
                        </div>
                        <span class="text-zinc-400 text-xs font-bold">R$ ${s.preco}</span>
                    </label>
                `).join('');
            }
        }

        function calcTotal() {
            let total = 0;
            document.querySelectorAll('input[type="checkbox"]:checked').forEach(c => total += parseFloat(c.dataset.price));
            document.getElementById('totalDisplay').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        async function finalizarAgendamento() {
            const nome = document.getElementById('nome').value;
            const zap = document.getElementById('whatsapp').value;
            const svs = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(c => c.value);
            const btn = document.getElementById('btnAgendar');

            if(!nome || !zap || !dataSelecionada || !horaSelecionada || svs.length === 0) {
                return alert("Falta preencher algo gata! 💅");
            }

            btn.innerText = "RESERVANDO... ✨";
            btn.disabled = true;

            const { error } = await _supabase.from('agendamentos').insert([{
                cliente_nome: nome, 
                cliente_whatsapp: zap,
                data_agendada: dataSelecionada, 
                horario_agendado: horaSelecionada,
                servico_id: svs[0]
            }]);

            if(error) {
                alert(error.message);
                btn.innerText = "CONFIRMAR AGENDAMENTO ✨";
                btn.disabled = false;
            } else {
                alert("AGENDADO COM SUCESSO! 💖");
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
